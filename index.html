<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Algernon Callier — Founder & Product Builder</title>
    <meta
      name="description"
      content="Algernon Callier is a founder and product builder in Orlando, Florida — CEO of Draft First Technologies, building AI-assisted software and strategic IP across multiple ventures."
    />
    <link rel="canonical" href="https://alcallier.example/" />

    <!-- Open Graph -->
    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Algernon Callier — Founder & Product Builder" />
    <meta
      property="og:description"
      content="Founder and CEO of Draft First Technologies. Corporate innovation leader turned high-agency product builder."
    />
    <meta property="profile:first_name" content="Algernon" />
    <meta property="profile:last_name" content="Callier" />

    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />

    <!-- Fonts: Fontshare (display + body). Falls back to system fonts if unavailable. -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,700&f[]=general-sans@400,500,600,700&f[]=jetbrains-mono@400,500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD structured data (person) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Algernon Callier",
        "givenName": "Algernon",
        "familyName": "Callier",
        "jobTitle": "Founder & CEO, Draft First Technologies Inc.",
        "homeLocation": { "@type": "Place", "name": "Orlando, Florida" },
        "alumniOf": [
          { "@type": "CollegeOrUniversity", "name": "University of Florida" },
          { "@type": "CollegeOrUniversity", "name": "Clark Atlanta University" },
          { "@type": "CollegeOrUniversity", "name": "Stanford University" }
        ],
        "sameAs": [
          "https://www.linkedin.com/in/alcallier",
          "https://x.com/PowerLawVC"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
